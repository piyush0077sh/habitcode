<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="160" viewBox="0 0 600 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple gradient -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pink overlay gradient -->
    <linearGradient id="pinkOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');
      .logo-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 64px;
        letter-spacing: -1.6px;
      }
    </style>
  </defs>
  
  <!-- Icon container (120x120 with 28% border radius = 33.6px, centered at y=80) -->
  <g filter="url(#shadow)">
    <!-- Background with purple gradient -->
    <rect x="20" y="20" width="120" height="120" rx="33.6" ry="33.6" fill="url(#purpleGradient)"/>
    
    <!-- Pink overlay with rotation effect -->
    <g transform="translate(80, 80) rotate(45) translate(-80, -80)">
      <rect x="50" y="50" width="60" height="60" fill="url(#pinkOverlay)"/>
    </g>
  </g>
  
  <!-- Track changes icon (scaled down to fit 120x120 container) -->
  <g transform="translate(80, 80)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>
    
    <!-- Middle circle -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4.5" fill="white" opacity="0.9"/>
    
    <!-- Curved arrow 1 (top right) -->
    <path d="M 18 -18 Q 25.5 -25.5 33 -18 L 30.75 -20.25 M 33 -18 L 30.75 -15.75" 
          stroke="white" stroke-width="4" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Curved arrow 2 (bottom left) -->
    <path d="M -18 18 Q -25.5 25.5 -33 18 L -30.75 20.25 M -33 18 L -30.75 15.75" 
          stroke="white" stroke-width="4" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Rotation arrows around the circles -->
    <path d="M 30 0 Q 36 -6 36 -12 L 38.25 -9.75 M 36 -12 L 33.75 -9.75" 
          stroke="white" stroke-width="3" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <path d="M -30 0 Q -36 6 -36 12 L -38.25 9.75 M -36 12 L -33.75 9.75" 
          stroke="white" stroke-width="3" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
  
  <!-- Text with proper spacing (gap of 24px from icon) -->
  <!-- "Habit" in dark gray/black -->
  <text x="164" y="100" class="logo-text" fill="#1a1a1a">Habit</text>
  
  <!-- "Cue" in purple -->
  <text x="346" y="100" class="logo-text" fill="#7c3aed">Cue</text>
</svg>
